#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Brandon W Maister"

[ui]
diff-editor = ":builtin"
default-command = "lgs"
revsets-use-glob-by-default = true
# https://docs.jj-vcs.dev/latest/config/#diff-format
diff-formatter = "dt"

[remotes.origin]
auto-track-bookmarks = "glob:bwm/*"

[aliases]
lg = ["log", "-r", "full"]
lgs = ["log", "-n20"]
tug = ["bookmark", "advance"]
tug- = ["bookmark", "advance", "--to", "@-"]
t- = ["tug-"]

# ignore eroneous input
# saw this online: typing jj jj command should just be command
jj = []
# muscle memory causes me to type :q in jjui all the time
q = ["util", "exec", "--", "echo", "this isn't vim"]

# state reconciliation and diffs
wus = ["workspace", "update-stale"]
rdc = ["resolve", "--tool=diffconflicts"]
diffweb = ["diff", "--tool=diffedit3"]
diffb = ["diff", "--tool=:color-words"]
dt = ["diff", "--tool=dt"]
dti = ["diff", "--tool=dti"]
# show description, nice because it doesn't include leading indentation
sdesc = ["log", "--template", "description", "--no-graph", "-r"]

# External tools, have them here to remind myself that they exist
tui = ["util", "exec", "--", "jjui"]
web = ["util", "exec", "--", "lightjj"]

# the ancestors of @ that are not in trunc()
lgcur = ["log", "-r", "cur"]
s = ["status"]
stat = ["diff", "--stat"]
ab = ["util", "exec", "--", "jj-ab"]
# similar to git diff --cached, old alias from svn index
ix = ["diff", "-r", "@-"]
amend = ["describe", "-r", "@-"]
# change the commit message of rhe parent commit
reword = ["describe", "-r", "@-"]
add-parent = ["util", "exec", "--", "bash", "-c", """
change=$1
new_parent=$2
jj rebase --simplify-parents -b "$change" -d "parents($change) | $new_parent"
jj log -r "$change | parents($change)"
""", "--"]
# `jj pull`: fetch, then rebase *everything* that was descended from main at
# pull time and whatever @ was onto the freshly-fetched main.
pull = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
set -e
old_main=$(jj log --no-graph --ignore-working-copy -r main@origin -T commit_id)
jj git fetch
src="roots((${old_main}.. | ::@) & mutable())"
if [ -n "$(jj log --no-graph -r "$src" -T commit_id)" ]; then
  jj rebase --skip-emptied --simplify-parents -s "$src" -o main@origin
else
  echo "pull: nothing descended from main to rebase"
fi
""",
]

#
# megamerge support: https://isaaccorbrey.com/notes/jujutsu-megamerges-for-fun-and-profit
#
# `jj stack <revset>` to include specific revs
stack = [
  "rebase",
  "--after",
  "trunk()",
  "--before",
  "closest_merge(@)",
  "--revision",
]
# `jj stage` to include the whole stack after the megamerge
stage = ["stack", "closest_merge(@).. ~ empty()"]
# `jj restack` to rebase *all* your changes onto `trunk()`
restack = [
  "rebase",
  "--onto",
  "trunk()",
  "--source",
  "roots(trunk()..) & mutable()",
]

[revsets]
log = "working_mine"

[templates]
draft_commit_description = "builtin_draft_commit_description_with_diff"

[revset-aliases]
"closest_merge(to)" = "heads(::to & merges())"
# All "working" branches that include at least one of my commits
# * immutable_heads().. -> commits that are not ancestors of any immutable head
#   (i.e., not yet merged into trunk/tags/untracked remotes) but are ancestors of some visible head.
# * mine() & immutable_heads().. -> my commits, only among those working changes.
# * reachable(srcs, domain) -> walks parents and children from srcs, but stays inside domain.
#   * So reachable(mine() & immutable_heads().., immutable_heads()..) = all commits in
#     “working changes” that lie on any connected branch containing at least one of my commits.
# * ancestors(my_changes, 2) -> show the change on trunk() that they diverged from
my_branches = 'reachable(mine() & immutable_heads().., immutable_heads()..)'
working_mine = 'ancestors(@, 3) | ancestors(my_branches, 2) | trunk()::@ | trunk()::mine()'
# Branches not merged into trunk() that contain at least one of my commits
working_from_trunk = 'reachable(mine() ~ ::trunk(), trunk()..)'

# default is from https://gist.github.com/guibou/0a8731e10dffe4919c987fc7bc263aea
default = 'present(@) | ancestors(immutable_heads().., 2) | present(trunk())'
# from https://willhbr.net/2024/08/18/understanding-revsets-for-a-better-jj-log-output/
log = '@ | ancestors(trunk()..(visible_heads() & mine() ~ description(regex:"spr")), 2) | trunk()'
full = '@ | ancestors(trunk()..(visible_heads() & mine() ~ description(regex:"spr"))) | trunk()'
spr = '@ | ancestors(trunk()..(visible_heads() & mine() | description(regex:"spr")), 2) | trunk()'

# working set of commits
cur = 'ancestors(@) ~ ancestors(trunk())'

"active(rev)" = "(ancestors(rev) | descendants(rev)) ~ immutable()"
work = "active(@)"

[fsmonitor]
backend = "watchman"

[merge-tools.dt]
# difftastic, via jj-difft wrapper that picks --display by terminal width
program = "jj-difft"
diff-args = ["--color=always", "--syntax-highlight=on", "$left", "$right"]
merge-args = ["--color=always", "$left", "$right"]

[merge-tools.dti]
# difftastic but inline
program = "difft"
diff-args = [
  "--color=always",
  "--display=inline",
  "--syntax-highlight=on",
  "$left",
  "$right",
]
merge-args = ["--color=always", "$left", "$right"]

[merge-tools.diffconflicts]
program = "nvim"
merge-args = [
  "-c",
  "let g:jj_diffconflicts_marker_length=$marker_length",
  "-c",
  "JJDiffConflicts!",
  "$output",
  "$base",
  "$left",
  "$right",
]
merge-tool-edits-conflict-markers = true

[merge-tools.delta]
program = "delta"
diff-args = ["--width=$width", "$left", "$right"]
